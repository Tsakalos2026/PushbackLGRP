<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rhodes Apron Pushback Tool</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div>
        <h1>Rhodes Apron Pushback Tool</h1>
        <p id="mode-description">
          Editor Mode: drag aircraft, rotate, resize, import, export, and reset.
        </p>
      </div>

      <div class="toolbar">
        <button id="mode-toggle-btn" type="button">Switch to Use Mode</button>

        <button id="rotate-left-btn" class="editor-only" type="button">Rotate Left</button>
        <button id="rotate-right-btn" class="editor-only" type="button">Rotate Right</button>
        <button id="size-down-btn" class="editor-only" type="button">Smaller</button>
        <button id="size-up-btn" class="editor-only" type="button">Larger</button>
        <button id="export-btn" class="editor-only" type="button">Export JSON</button>
        <button id="reset-btn" class="editor-only" type="button">Reset</button>

        <label id="import-label" class="import-label editor-only" for="import-file">Import JSON</label>
        <input id="import-file" type="file" accept=".json" />
      </div>
    </header>

    <main class="board-wrap">
      <div id="apron-board" class="apron-board">
        <img
          id="apron-map"
          class="apron-map"
          src="./apron-map.png"
          alt="Rhodes apron map"
          draggable="false"
        />
        <div id="aircraft-layer" class="aircraft-layer"></div>
      </div>
    </main>

    <section class="legend">
      <h2>Selected aircraft</h2>
      <div id="selected-aircraft" class="selected-aircraft">[EDITOR] None selected.</div>
      <pre id="live-data" class="live-data"></pre>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
