<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rhodes Apron Pushback Prototype</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div>
        <h1>Rhodes Apron Pushback Prototype</h1>
        <p>Drag aircraft to position them. Mouse wheel rotates. Shift + wheel resizes.</p>
      </div>

      <div class="toolbar">
        <button id="export-btn" type="button">Export JSON</button>
        <button id="reset-btn" type="button">Reset</button>
        <label class="import-label" for="import-file">Import JSON</label>
        <input id="import-file" type="file" accept=".json" />
      </div>
    </header>

    <main class="board-wrap">
      <div id="apron-board" class="apron-board">
        <img
          id="apron-map"
          class="apron-map"
          src="./apron-map.png"
          alt="Rhodes apron map"
          draggable="false"
        />
        <div id="aircraft-layer" class="aircraft-layer"></div>
      </div>
    </main>

    <section class="legend">
      <h2>Selected aircraft</h2>
      <div id="selected-aircraft" class="selected-aircraft">None selected.</div>
      <pre id="live-data" class="live-data"></pre>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
